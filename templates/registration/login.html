{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Letsupp Report System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            background-color: #f8fafc;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 8px 10px -6px rgba(0, 0, 0, 0.1);
            text-align: center;
        }

        .login-card img {
            width: 140px;
            margin-bottom: 24px;
        }

        .login-card h2 {
            color: #1e293b;
            font-weight: 700;
            margin-bottom: 8px;
            font-size: 1.5rem;
        }
        
        .login-card p {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 0.9rem;
        }

        form {
            width: 100%;
            text-align: left;
        }

        label {
            font-weight: 600;
            color: #475569;
            margin-bottom: 8px;
            display: block;
            font-size: 0.85rem;
        }

        input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            font-size: 0.95rem;
            transition: all 0.2s ease;
            background-color: #f8fafc;
        }

        input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
            background-color: #fff;
            outline: none;
        }

        .btn-login {
            background-color: #6366f1;
            border: none;
            color: white;
            font-weight: 700;
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            margin-top: 32px;
            font-size: 1rem;
            transition: all 0.25s ease;
            box-shadow: 0 4px 6px -1px rgba(99, 102, 241, 0.3);
        }

        .btn-login:hover {
            background-color: #4f46e5;
            transform: translateY(-1px);
            box-shadow: 0 10px 15px -3px rgba(99, 102, 241, 0.4);
        }

        .btn-login:active {
            transform: translateY(0);
        }

        .input-group-text {
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-left: none;
            color: #64748b;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        
        .password-toggle:hover {
            background-color: #f1f5f9;
            color: #334155;
        }
        
        .alert {
            font-size: 0.85rem;
            border-radius: 10px;
            padding: 12px 16px;
            margin-bottom: 24px;
            border: none;
        }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="{% static 'reports/Logo_border.png' %}" alt="Logo">
        <h2>Welcome back</h2>
        <p>Please enter your details to sign in</p>

        {% if form.errors %}
        <div class="alert alert-danger bg-danger-subtle text-danger">
            Invalid username or password. Please try again.
        </div>
        {% endif %}

        <form method="post">
            {% csrf_token %}
            <div class="mb-4">
                <label for="id_username">Username</label>
                <input type="text" name="username" id="id_username" placeholder="Enter your username" required autofocus>
            </div>

            <div class="mb-1">
                <label for="id_password">Password</label>
                <div class="input-group">
                    <input type="password" name="password" id="id_password" placeholder="••••••••" required style="border-top-right-radius: 0; border-bottom-right-radius: 0;">
                    <span class="input-group-text password-toggle" id="togglePassword">
                        <svg id="eyeIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path>
                            <circle cx="12" cy="12" r="3"></circle>
                        </svg>
                    </span>
                </div>
            </div>

            <button type="submit" class="btn-login">Sign in</button>
        </form>
    </div>

    <script>
        const togglePassword = document.querySelector('#togglePassword');
        const password = document.querySelector('#id_password');
        const eyeIcon = document.querySelector('#eyeIcon');

        togglePassword.addEventListener('click', function (e) {
            const type = password.getAttribute('type') === 'password' ? 'text' : 'password';
            password.setAttribute('type', type);
            
            if (type === 'text') {
                eyeIcon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line>';
            } else {
                eyeIcon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle>';
            }
        });
    </script>
</body>
</html>
